<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Tellsearch - Powered by TellmeOrg</title>
    <style>
        body {
            font-family: sans-serif;
            background: #fff;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background: #fff;
            padding: 10px 20px;
            border-bottom: 2px solid #f07;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .logo-name {
            font-size: 20px;
            color: #f07;
            font-weight: bold;
        }
        .menu {
            font-size: 30px;
            cursor: pointer;
            color: #f07;
        }

        .search-box {
            margin: 20px;
            text-align: center;
        }

        .search-box input {
            width: 90%;
            max-width: 600px;
            padding: 12px;
            border: 2px solid #f07;
            border-radius: 8px;
            font-size: 16px;
        }

        .results {
            padding: 10px 20px;
        }

        .result-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .result-item img {
            width: 120px;
            height: 120px;
            background: #ccc;
            margin-right: 15px;
            border-radius: 8px;
        }

        .result-content {
            flex: 1;
        }

        .result-title {
            font-size: 18px;
            color: #333;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .result-text {
            color: #666;
            font-size: 14px;
        }

        footer {
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #ddd;
            background: #fafafa;
            font-weight: bold;
            direction: rtl;
        }
        a {
            color:;
        }
    }
</style>
</head>
<body>

<header>
<div class="logo">
<img src="p.png" alt="TellmeOrg Logo">
<span class="logo-name">TellmeOrg</span>
</div>
<a href="more.html">
<div class="menu">
☰
</div>
</a>
</header>

<div class="search-box">
<input type="text" placeholder="Search by TellmeOrg ...">
</div>

<div class="results">
<div class="result-item">
<img src="p.png" alt="Result Image">
<div class="result-content">
<div class="result-title">
عنوان النتيجة الأولى
</div>
<div class="result-text">
نص توضيحي مختصر حول المحتوى أو الرابط المعروض هنا.
</div>
</div>
</div>

<div class="result-item">
<img src="" alt="Result Image">
<div class="result-content">
<div class="result-title">
عنوان النتيجة الثانية
</div>
<div class="result-text">
شرح موجز عن هذه النتيجة مع بعض المعلومات.
</div>
</div>
</div>
</div>

<footer>
<div>
المنطقة الدولة
</div>
<div>
اللغة
</div>
<div>
المساعدة
</div>
</footer>

</body>
</html>
